# LunarLander PPO training config — baseline experiment
algorithm: PPO
env: LunarLander-v3

# Architecture
net_arch: [64, 64]
activation: tanh

# PPO hyperparameters
learning_rate: 0.0003
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.999
gae_lambda: 0.98
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

# Training
total_timesteps: 100000
n_envs: 4
seed: 42
